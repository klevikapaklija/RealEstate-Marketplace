<!DOCTYPE html>
<html>
<head>
    <title>SVG to PNG Converter</title>
</head>
<body>
    <h2>Favicon Converter</h2>
    <p>Click the buttons below to download PNG versions of your favicon:</p>
    
    <button onclick="convertToPNG(16)">Download 16x16</button>
    <button onclick="convertToPNG(32)">Download 32x32</button>
    <button onclick="convertToPNG(192)">Download 192x192</button>
    <button onclick="convertToPNG(512)">Download 512x512</button>
    
    <br><br>
    <canvas id="canvas" style="border: 1px solid #ccc;"></canvas>

    <script>
        const svgString = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9333ea;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="100" height="100" rx="20" ry="20" fill="url(#grad)"/>
  <path d="M 20 50 L 50 25 L 80 50 M 27 50 L 27 75 L 40 75 L 40 75 M 60 75 L 73 75 L 73 50 M 40 75 L 40 60 L 60 60 L 60 75 L 40 75 Z" 
        stroke="white" 
        stroke-width="4" 
        fill="none" 
        stroke-linecap="round" 
        stroke-linejoin="round"/>
</svg>`;

        function convertToPNG(size) {
            const canvas = document.getElementById('canvas');
            const ctx = canvas.getContext('2d');
            
            canvas.width = size;
            canvas.height = size;
            
            const img = new Image();
            const svg = new Blob([svgString], { type: 'image/svg+xml' });
            const url = URL.createObjectURL(svg);
            
            img.onload = function() {
                ctx.drawImage(img, 0, 0, size, size);
                
                canvas.toBlob(function(blob) {
                    const link = document.createElement('a');
                    link.download = `favicon-${size}x${size}.png`;
                    link.href = URL.createObjectURL(blob);
                    link.click();
                    URL.revokeObjectURL(url);
                }, 'image/png');
            };
            
            img.src = url;
        }
    </script>
</body>
</html>
